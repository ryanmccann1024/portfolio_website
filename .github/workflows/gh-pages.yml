name: Deploy static site to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  schedule:
    - cron: '*/20 * * * *'   # re-sync Notion every 20 minutes

permissions:
  contents: read
  pages: write
  id-token: write      # OIDC for deploy

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22          # any ≥ 18

      - run: npm ci
      - run: node scripts/fetch-notion.mjs
        env:
          VITE_NOTION_TOKEN: ${{ secrets.VITE_NOTION_TOKEN }}
      - run: npm run build          # outputs dist/

      # 🆕 This step registers the build with Pages
      - uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
